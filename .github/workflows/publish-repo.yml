name: Publish Cydia/Sileo repo

# Fires when a release is published — the same moment publish-source.yml
# updates the AltStore source. Downloads the .deb assets of EVERY published
# release, generates the static APT repo (Packages/Release) and deploys it to
# GitHub Pages, so jailbroken devices see the update in Sileo/Zebra/Cydia and
# can install any released version, not just the latest.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
# Repo URL for package managers: https://verback2308.github.io/ytlite/
# (all-lowercase on purpose: Sileo/Cydia lowercase entered URLs and GitHub
# Pages paths are case-sensitive — hence the lowercase repository name).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Download debs from all published releases
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p debs
          # Deb filenames carry the version, so downloads never collide.
          # Releases without .deb assets (pre-1.4.3) just skip.
          gh release list --exclude-drafts --limit 1000 \
            --json tagName --jq '.[].tagName' |
            while read -r tag; do
              gh release download "$tag" --pattern '*.deb' --dir debs 2>/dev/null ||
                echo "$tag: no debs, skipping"
            done
          COUNT=$(find debs -name '*.deb' | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Collected $COUNT deb(s)"
          if [ "$COUNT" = "0" ]; then
            echo "No release has .deb assets yet — nothing to deploy"
          fi

      - name: Generate APT repo
        if: steps.fetch.outputs.count != '0'
        run: |
          python3 scripts/make_repo.py --debs debs --out site
          cp source/icon.png site/CydiaIcon.png

      - name: Upload Pages artifact
        if: steps.fetch.outputs.count != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.fetch.outputs.count != '0'
        id: deployment
        uses: actions/deploy-pages@v4
